[project]
name = "stock-db"
version = "0.1.0"
description = "Shared stock database and browser service for Japanese equity research"
requires-python = ">=3.10"
dependencies = [
    "requests>=2.28,<3",
    "truststore>=0.9,<1",
    "brotli>=1.1,<2",
    "pysocks>=1.7,<2",
]

[dependency-groups]
dev = [
    "pytest>=8.0,<9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stock_db"]
