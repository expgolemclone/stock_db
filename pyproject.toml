[project]
name = "stock-db"
version = "0.1.0"
description = "Shared stock database and browser service for Japanese equity research"
requires-python = ">=3.11"
dependencies = [
    "requests>=2.28,<3",
    "truststore>=0.9,<1",
    "brotli>=1.1,<2",
    "pysocks>=1.7,<2",
    "beautifulsoup4>=4.14.3",
]

[dependency-groups]
dev = [
    "pytest>=8.0,<9",
]

[project.scripts]
fetch-irbank-files = "stock_db.cli.fetch_irbank_files:main"
generate-validation-site-list = "stock_db.cli.generate_validation_site_list:main"
scrape-irbank-bs = "stock_db.cli.scrape_irbank_bs:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stock_db"]
