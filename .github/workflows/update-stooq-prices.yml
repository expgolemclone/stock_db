name: Update Stooq Prices

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: stooq-price-update-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  update-stooq-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Sync Python dependencies
        run: uv sync --frozen

      - name: Install browser service dependencies
        run: npm ci --prefix services/browser

      - name: Install OCR fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu-extra \
            fonts-freefont-ttf \
            fonts-liberation

      - name: Restore previous stocks.db artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$(gh run list --workflow update-stooq-prices.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
          if [ -n "$run_id" ]; then
            gh run download "$run_id" -n stocks-db -D var/db
          else
            echo "No prior successful stocks-db artifact found; starting from the checked-out DB state."
          fi

      - name: Refresh stock prices
        run: uv run refresh-prices --headless

      - name: Purge irbank financial_items
        run: uv run purge-irbank-financials

      - name: Upload stocks.db artifact
        uses: actions/upload-artifact@v4
        with:
          name: stocks-db
          path: var/db/stocks.db
