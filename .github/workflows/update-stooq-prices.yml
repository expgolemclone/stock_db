name: Update Stooq Prices

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stooq-price-update-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  update-stooq-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Git LFS
        run: git lfs install

      - name: Sync Python dependencies
        run: uv sync --frozen

      - name: Install browser service dependencies
        run: npm ci --prefix services/browser

      - name: Install OCR fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu-extra \
            fonts-freefont-ttf \
            fonts-liberation

      - name: Update Stooq prices
        run: uv run scrape-stooq-prices --headless

      - name: Checkpoint SQLite WAL
        run: sqlite3 var/db/stocks.db "PRAGMA wal_checkpoint(TRUNCATE);"

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add var/db/stocks.db
          if git diff --cached --quiet -- var/db/stocks.db; then
            echo "No database changes to commit"
            exit 0
          fi
          git commit -m "chore: update stooq prices"
          git push origin HEAD:${GITHUB_REF_NAME}
