[fetch_irbank_files]
years = 5
interval_seconds = 1.0
proxy = "direct"
output_dir = "var/raw/irbank"

[generate_validation_site_list]
count = 5000
output = "var/generated/validation_sites.txt"

[scrape_irbank_bs]
proxy = "direct"
skip_existing = true
pool_size = 1
headless = false
disable_xvfb = true

[scrape_edinet_reports]
proxy = "direct"
skip_existing = true
